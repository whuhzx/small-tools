<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>晚点风格图片生成器</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <style>
    :root {
      --late-red: #E53935;
      --late-dark: #1a1a1a;
      --late-gray: #666;
      --late-light: #f5f5f5;
      --card-width: 1125px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--late-light);
      min-height: 100vh;
    }

    /* 头部 */
    .header {
      background: var(--late-red);
      color: white;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .header-slogan {
      font-size: 14px;
      opacity: 0.9;
    }

    .export-btn {
      background: white;
      color: var(--late-red);
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .export-btn:hover {
      background: #fff5f5;
      transform: translateY(-1px);
    }

    .export-btn:disabled {
      background: rgba(255,255,255,0.5);
      color: rgba(229,57,53,0.5);
      cursor: not-allowed;
      transform: none;
    }

    /* 主体布局 */
    .container {
      display: flex;
      height: calc(100vh - 52px);
    }

    /* 左侧输入区 */
    .input-panel {
      width: 420px;
      padding: 20px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-section > label {
      font-size: 13px;
      color: var(--late-gray);
      font-weight: 500;
    }

    .input-panel textarea {
      flex: 1;
      min-height: 280px;
      width: 100%;
      padding: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.8;
      resize: none;
      font-family: inherit;
    }

    .input-panel textarea:focus {
      outline: none;
      border-color: var(--late-red);
      box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
    }

    /* 设置区 */
    .settings-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      background: var(--late-light);
      border-radius: 8px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings-row label {
      min-width: 70px;
      font-size: 13px;
      color: var(--late-dark);
    }

    .settings-row select,
    .settings-row input[type="number"] {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      background: white;
    }

    .settings-row input[type="number"] {
      width: 70px;
      flex: none;
    }

    .settings-row select:focus,
    .settings-row input:focus {
      outline: none;
      border-color: var(--late-red);
    }

    .settings-row .unit {
      font-size: 12px;
      color: var(--late-gray);
      min-width: 20px;
    }

    .settings-row .hint {
      font-size: 11px;
      color: #999;
    }

    .input-hint {
      padding: 12px;
      background: #fff5f5;
      border-radius: 6px;
      font-size: 12px;
      color: var(--late-gray);
      line-height: 1.8;
    }

    .input-hint code {
      background: var(--late-red);
      color: white;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: inherit;
    }

    /* 右侧预览区 */
    .preview-panel {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #e0e0e0;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .preview-header label {
      font-size: 13px;
      color: var(--late-gray);
      font-weight: 500;
    }

    .preview-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    /* 预览项 */
    .preview-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    /* 晚点风格页面卡片 - 预览时用 zoom 缩放 */
    .page-card {
      width: var(--card-width);
      background: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .preview-item .page-card {
      zoom: 0.42;
    }

    /* 背景光晕容器 */
    .page-card .glow-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    /* 单个光晕 */
    .page-card .glow {
      position: absolute;
      left: 0;
      right: 0;
      height: 600px;
      pointer-events: none;
    }

    /* 水印容器 */
    .page-card .watermark-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    /* 单个水印 */
    .page-card .watermark {
      position: absolute;
      width: 200px;
      opacity: 0.7;
      transform: rotate(-30deg);
      pointer-events: none;
    }

    .page-card .watermark img {
      width: 100%;
      height: auto;
    }

    /* 左右红色细线装饰 */
    .page-card .left-line,
    .page-card .right-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--late-red);
      z-index: 2;
    }

    .page-card .left-line { left: 0; }
    .page-card .right-line { right: 0; }

    /* 顶部条纹（仅第一页） */
    .page-card .top-banner {
      background: var(--late-red);
      padding: 10px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .top-banner .logo {
      font-size: 20px;
      font-weight: 700;
      color: white;
      letter-spacing: 3px;
    }

    /* 底部条纹（仅最后一页） */
    .page-card .bottom-banner {
      background: var(--late-red);
      height: 8px;
      position: relative;
      z-index: 1;
    }

    /* 内容区域 */
    .page-content {
      padding: 70px 60px;
      font-family: "Noto Sans SC", sans-serif;
      position: relative;
      z-index: 1;
    }

    /* 标题样式 */
    .page-content .title {
      text-align: center;
      margin-bottom: 40px;
      line-height: 1.4;
    }

    .page-content .body-text {
      color: var(--late-dark);
      line-height: 2;
      text-align: justify;
      word-break: normal;
      overflow-wrap: break-word;
    }

    .page-content .body-text p {
      margin-bottom: 1.4em;
    }

    .page-content .body-text p:last-child {
      margin-bottom: 0;
    }

    .page-content .body-text .title {
      margin-top: 0.5em;
    }

    .page-content .body-text .title:first-child {
      margin-top: 0;
    }

    /* 列表样式 */
    .page-content .body-text ul,
    .page-content .body-text ol {
      margin: 1.2em 0;
      padding-left: 1.5em;
    }

    .page-content .body-text li {
      margin-bottom: 0.8em;
      line-height: 1.8;
    }

    /* 引用样式 */
    .page-content .body-text .quote {
      background: #f7f7f7;
      border-left: 4px solid var(--late-red);
      padding: 16px 20px;
      margin: 0 0 1.4em 0;
      color: #555;
    }

    /* 右对齐样式 */
    .page-content .body-text .align-right {
      text-align: right;
      margin-bottom: 20px;
    }

    .page-content .body-text .export-block:last-child {
      margin-bottom: 0 !important;
    }

    .page-content .body-text .export-line {
      white-space: nowrap;
    }

    .page-content .body-text .export-unit {
      display: inline-block;
      white-space: pre;
      vertical-align: top;
    }

    .page-content .body-text .export-list {
      margin: 1.2em 0;
    }

    .page-content .body-text .export-list-item:last-child {
      margin-bottom: 0 !important;
    }

    /* 页码指示 */
    .page-indicator {
      font-size: 12px;
      color: #888;
      padding: 3px 10px;
      background: rgba(255,255,255,0.8);
      border-radius: 3px;
    }

    /* 空状态 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 400px;
      color: #999;
      font-size: 14px;
      gap: 8px;
    }

    .empty-state::before {
      content: '';
      width: 64px;
      height: 64px;
      background: #ddd;
      border-radius: 50%;
    }

    /* 导出中状态 */
    .exporting {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .exporting-content {
      background: white;
      padding: 40px 56px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .exporting-content .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #f0f0f0;
      border-top-color: var(--late-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    .exporting-content p {
      color: var(--late-dark);
      font-size: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    /* 导出时的隐藏容器 */
    #exportContainer {
      position: absolute;
      left: -9999px;
      top: 0;
    }

    #exportContainer .page-card {
      zoom: 1;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1>LatePost</h1>
      <span class="header-slogan">晚点风格图片生成器</span>
    </div>
    <button class="export-btn" id="exportBtn" disabled>导出图片</button>
  </div>

  <div class="container">
    <div class="input-panel">
      <div class="panel-section">
        <label>正文样式</label>
        <div class="settings-group">
          <div class="settings-row">
            <label>字号</label>
            <input type="number" id="fontSize" value="36" min="20" max="50">
            <span class="unit">px</span>
            <span class="hint">(20-50)</span>
          </div>
          <div class="settings-row">
            <label>行高</label>
            <select id="lineHeight">
              <option value="1.8">1.8 (紧凑)</option>
              <option value="2.0" selected>2.0 (标准)</option>
              <option value="2.2">2.2 (宽松)</option>
            </select>
          </div>
          <div class="settings-row">
            <label>内边距</label>
            <select id="padding">
              <option value="48">48px (小)</option>
              <option value="60" selected>60px (中)</option>
              <option value="72">72px (大)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <label>标题样式</label>
        <div class="settings-group">
          <div class="settings-row">
            <label>字体</label>
            <select id="titleFont">
              <option value="'Noto Serif SC', serif">思源宋体</option>
              <option value="'Noto Sans SC', sans-serif">思源黑体</option>
            </select>
          </div>
          <div class="settings-row">
            <label>字号</label>
            <input type="number" id="titleSize" value="42" min="24" max="80">
            <span class="unit">px</span>
            <span class="hint">(24-80)</span>
          </div>
        </div>
      </div>

      <div class="panel-section" style="flex: 1; display: flex; flex-direction: column;">
        <label>输入文字内容</label>
        <textarea id="inputText" placeholder="在此粘贴文字内容..." style="flex: 1;"></textarea>
      </div>

      <div class="input-hint">
        <div><code>---</code> 分割页面</div>
        <div><code>[title:标题文字]</code> 居中大标题</div>
        <div><code>[right:文字]</code> 右对齐文字</div>
        <div><code>> 引用内容</code> 引用块</div>
      </div>
    </div>

    <div class="preview-panel">
      <div class="preview-header">
        <label>预览效果（共 <span id="pageCount">0</span> 页）</label>
      </div>
      <div class="preview-wrapper" id="previewWrapper">
        <div class="empty-state">请在左侧输入内容</div>
      </div>
    </div>
  </div>

  <!-- 导出用的隐藏容器 -->
  <div id="exportContainer"></div>

  <div class="exporting hidden" id="exportingModal">
    <div class="exporting-content">
      <div class="spinner"></div>
      <p>正在生成图片...</p>
    </div>
  </div>

  <script>

    const inputText = document.getElementById('inputText');
    const previewWrapper = document.getElementById('previewWrapper');
    const pageCount = document.getElementById('pageCount');
    const exportBtn = document.getElementById('exportBtn');
    const exportingModal = document.getElementById('exportingModal');
    const exportContainer = document.getElementById('exportContainer');

    // 样式设置
    const fontSize = document.getElementById('fontSize');
    const lineHeight = document.getElementById('lineHeight');
    const padding = document.getElementById('padding');
    const titleFont = document.getElementById('titleFont');

    const CARD_WIDTH = 1125;
    const measureCanvas = document.createElement('canvas');
    const measureContext = measureCanvas.getContext('2d');
    const textMeasureCache = new Map();

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function parseBlocks(text) {
      const lines = text.split('\n');
      const blocks = [];
      let listItems = [];
      let quoteLines = [];

      function flushList() {
        if (listItems.length) {
          blocks.push({ type: 'list', items: listItems });
          listItems = [];
        }
      }

      function flushQuote() {
        if (quoteLines.length) {
          blocks.push({ type: 'quote', lines: quoteLines });
          quoteLines = [];
        }
      }

      for (const rawLine of lines) {
        const line = rawLine.trim();

        const titleMatch = line.match(/^\[title:(.+)\]$/);
        if (titleMatch) {
          flushList();
          flushQuote();
          blocks.push({ type: 'title', text: titleMatch[1] });
          continue;
        }

        const rightMatch = line.match(/^\[right:(.+)\]$/);
        if (rightMatch) {
          flushList();
          flushQuote();
          blocks.push({ type: 'right', text: rightMatch[1] });
          continue;
        }

        if (line.startsWith('> ') || line === '>') {
          flushList();
          quoteLines.push(line.substring(1).trim());
          continue;
        }

        if (line.startsWith('- ')) {
          flushQuote();
          listItems.push(line.substring(2));
          continue;
        }

        flushList();
        flushQuote();

        if (line) {
          blocks.push({ type: 'paragraph', text: line });
        }
      }

      flushList();
      flushQuote();
      return blocks;
    }

    function renderPreviewContent(blocks, styles) {
      return blocks.map((block, index) => {
        switch (block.type) {
          case 'title':
            return `<div class="title" style="font-family: ${styles.titleFont}; font-size: ${styles.titleSize}; font-weight: 700; color: var(--late-red);">${escapeHtml(block.text)}</div>`;
          case 'right':
            return `<div class="align-right">${escapeHtml(block.text)}</div>`;
          case 'quote':
            return `<div class="quote">${block.lines.map(escapeHtml).join('<br>')}</div>`;
          case 'list':
            return `<ul>${block.items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
          case 'paragraph':
            return `<p>${escapeHtml(block.text)}</p>`;
          default:
            return '';
        }
      }).join('');
    }

    function getTextMetrics(fontSpec) {
      const key = JSON.stringify(fontSpec);
      if (textMeasureCache.has(key)) {
        return textMeasureCache.get(key);
      }

      const canvasFont = `${fontSpec.weight || 400} ${fontSpec.size}px ${fontSpec.family}`;
      const metrics = {
        font: canvasFont,
        measure(text) {
          measureContext.font = canvasFont;
          return measureContext.measureText(text).width;
        }
      };

      textMeasureCache.set(key, metrics);
      return metrics;
    }

    function isAsciiWordChar(char) {
      return /[A-Za-z0-9%&+./:_='’-]/.test(char);
    }

    function tokenizeUnits(text, metrics) {
      const openingPunctuation = new Set(['（', '【', '《', '〈', '「', '『', '‘', '“', '(']);
      const closingPunctuation = new Set(['，', '。', '！', '？', '；', '：', '、', '）', '】', '》', '〉', '」', '』', '’', '”', ',', '.', '!', '?', ';', ':', ')', '%']);
      const chars = Array.from(text.trim());
      const units = [];
      let pendingPrefix = '';
      let pendingSpaces = '';
      let wordBuffer = '';

      function pushUnit(unitText, kind) {
        if (!unitText) return;
        units.push({
          text: pendingPrefix + unitText,
          kind,
          spaceBefore: pendingSpaces && units.length ? metrics.measure(pendingSpaces) : 0,
          width: metrics.measure(pendingPrefix + unitText)
        });
        pendingPrefix = '';
        pendingSpaces = '';
      }

      function flushWord() {
        if (!wordBuffer) return;
        pushUnit(wordBuffer, 'word');
        wordBuffer = '';
      }

      for (const char of chars) {
        if (/\s/.test(char)) {
          flushWord();
          pendingSpaces += char;
          continue;
        }

        if (isAsciiWordChar(char)) {
          wordBuffer += char;
          continue;
        }

        flushWord();

        if (openingPunctuation.has(char)) {
          pendingPrefix += char;
          continue;
        }

        if (closingPunctuation.has(char) && units.length) {
          const lastUnit = units[units.length - 1];
          lastUnit.text += char;
          lastUnit.width = metrics.measure(lastUnit.text);
          pendingSpaces = '';
          continue;
        }

        pushUnit(char, 'char');
      }

      flushWord();

      if (pendingPrefix) {
        units.push({
          text: pendingPrefix,
          kind: 'char',
          spaceBefore: pendingSpaces && units.length ? metrics.measure(pendingSpaces) : 0,
          width: metrics.measure(pendingPrefix)
        });
      }

      return units;
    }

    function breakIntoLines(text, maxWidth, fontSpec) {
      const metrics = getTextMetrics(fontSpec);
      const units = tokenizeUnits(text, metrics);
      const lines = [];
      let currentLine = [];
      let currentWidth = 0;

      for (const unit of units) {
        const spacing = currentLine.length ? unit.spaceBefore : 0;
        const unitWidth = unit.width + spacing;

        if (currentLine.length && currentWidth + unitWidth > maxWidth) {
          lines.push(currentLine);
          currentLine = [{ ...unit, spaceBefore: 0 }];
          currentWidth = unit.width;
          continue;
        }

        currentLine.push({ ...unit, spaceBefore: spacing });
        currentWidth += currentLine.length === 1 ? unit.width : unitWidth;
      }

      if (currentLine.length) {
        lines.push(currentLine);
      }

      if (!lines.length) {
        lines.push([]);
      }

      return lines;
    }

    function getLineWidth(line) {
      return line.reduce((sum, unit, index) => {
        return sum + unit.width + (index > 0 ? unit.spaceBefore : 0);
      }, 0);
    }

    function renderExportLine(line, options) {
      const { width, align = 'left', justify = false, lineHeight } = options;
      const gapCount = Math.max(line.length - 1, 0);
      const baseWidth = getLineWidth(line);
      const extraSpacing = justify && gapCount > 0 ? Math.max(width - baseWidth, 0) / gapCount : 0;
      const justifyStyle = align === 'right' ? 'text-align: right;' : align === 'center' ? 'text-align: center;' : '';
      const unitsHtml = line.map((unit, index) => {
        const marginLeft = index === 0 ? 0 : unit.spaceBefore + (justify ? extraSpacing : 0);
        return `<span class="export-unit" style="margin-left: ${marginLeft.toFixed(2)}px;">${escapeHtml(unit.text)}</span>`;
      }).join('');

      return `<div class="export-line" style="line-height: ${lineHeight}px; min-height: ${lineHeight}px; ${justifyStyle}">${unitsHtml}</div>`;
    }

    function renderExportBlock(text, options) {
      const lines = breakIntoLines(text, options.width, options.font);
      return lines.map((line, index) => {
        const shouldJustify = options.align === 'justify' && index < lines.length - 1 && line.length > 1;
        return renderExportLine(line, {
          width: options.width,
          align: options.align === 'justify' ? 'left' : options.align,
          justify: shouldJustify,
          lineHeight: options.lineHeight
        });
      }).join('');
    }

    function renderExportContent(blocks, styles) {
      const bodyFontSize = parseFloat(styles.fontSize);
      const titleFontSize = parseFloat(styles.titleSize);
      const contentWidth = CARD_WIDTH - parseFloat(styles.padding) * 2;

        family: '"Noto Sans SC", sans-serif',
        size: bodyFontSize,
        weight: 400

        family: styles.titleFont,

        switch (block.type) {

              <div class="title export-block" style="font-family: ${styles.titleFont}; font-size: ${styles.titleSize}; font-weight: 700; color: var(--late-red); margin-top: ${marginTop}px; margin-bottom: ${marginBottom}px;">

                  width: contentWidth,
                  align: 'right',
                  font: bodyFont,
                  lineHeight: bodyLineHeight
                })}
              </div>
            `;
          }
          case 'quote': {
            const quoteWidth = Math.max(contentWidth - 44, 0);
            const marginBottom = isLastBlock ? 0 : paragraphSpacing;
            return `
              <div class="quote export-block" style="margin-bottom: ${marginBottom}px;">
                ${block.lines.map(line => renderExportBlock(line, {
                  width: quoteWidth,
                  align: 'left',
                  font: bodyFont,
                  lineHeight: bodyLineHeight
                })).join('')}
              </div>
            `;
          }
          case 'list': {
            const indent = bodyFontSize * 1.5;
            const marginBottom = isLastBlock ? 0 : listSpacing;
            return `
              <div class="export-list export-block" style="margin-bottom: ${marginBottom}px;">
                ${block.items.map((item, itemIndex) => {
                  const itemMarginBottom = itemIndex === block.items.length - 1 ? 0 : listItemSpacing;
                  return `
                    <div class="export-list-item" style="position: relative; padding-left: ${indent}px; margin-bottom: ${itemMarginBottom}px;">
                      <span style="position: absolute; left: 0; top: 0; width: ${indent}px; line-height: ${bodyLineHeight}px;">•</span>
                      ${renderExportBlock(item, {
                        width: contentWidth - indent,
                        align: 'left',
                        font: bodyFont,
                        lineHeight: bodyLineHeight
                      })}
                    </div>
                  `;
                }).join('')}
              </div>
            `;
          }
          case 'paragraph':
          default: {
            const marginBottom = isLastBlock ? 0 : paragraphSpacing;
            return `
              <div class="export-block" style="margin-bottom: ${marginBottom}px;">
                ${renderExportBlock(block.text, {
                  width: contentWidth,
                  align: 'justify',
                  font: bodyFont,
                  lineHeight: bodyLineHeight
                })}
              </div>
            `;
          }
        }
      }).join('');
    }

    // 获取当前样式（不强制修改输入值）
    function getStyles() {
      let size = parseInt(fontSize.value) || 36;
      if (size < 20) size = 20;
      if (size > 50) size = 50;

      let tSize = parseInt(titleSize.value) || 42;
      if (tSize < 24) tSize = 24;
      if (tSize > 80) tSize = 80;

      return {
        fontSize: size + 'px',
        lineHeight: lineHeight.value,
        padding: padding.value + 'px',
        titleFont: titleFont.value,
        titleSize: tSize + 'px'
      };
    }

    // 生成页面卡片 HTML
    function generatePageCard(content, index, total, styles) {
      const isFirst = index === 0;
      const isLast = index === total - 1;

      let topBanner = '';
      let bottomBanner = '';

      if (isFirst) {
        topBanner = `
          <div class="top-banner">
            <span class="logo">LatePost</span>
          </div>
        `;
      }

      if (isLast) {
        bottomBanner = `<div class="bottom-banner"></div>`;
      }

      return `
        <div class="page-card">
          <div class="glow-container"></div>
          <div class="watermark-container"></div>
          <div class="left-line"></div>
          <div class="right-line"></div>
          ${topBanner}
          <div class="page-content" style="padding: 70px ${styles.padding};">
            <div class="body-text" style="font-size: ${styles.fontSize}; line-height: ${styles.lineHeight};">
              ${content}
            </div>
          </div>
          ${bottomBanner}
        </div>
      `;
    }

    // 动态生成水印
    function generateWatermarks(container, height) {
      const rowHeight = 280; // 每行水印间隔
      const startTop = 100; // 顶部留白
      const rows = Math.ceil((height - startTop) / rowHeight);
      let html = '';

      for (let i = 0; i < rows; i++) {
        const top = startTop + i * rowHeight;
        // 交错排列：奇数行偏左，偶数行偏右
        const leftOffset = (i % 2 === 0) ? 5 : 30;

        // 每行放 2-3 个水印
        html += `<div class="watermark" style="top: ${top}px; left: ${leftOffset}%;"><img src="${logoDataURL}"></div>`;
        html += `<div class="watermark" style="top: ${top}px; left: ${leftOffset + 45}%;"><img src="${logoDataURL}"></div>`;

        if (i % 2 === 0) {
          html += `<div class="watermark" style="top: ${top}px; left: ${leftOffset + 90}%;"><img src="${logoDataURL}"></div>`;
        }
      }

      container.innerHTML = html;
    }

    // 动态生成间隔光晕
    function generateGlows(container, height) {
      const interval = 500; // 每隔 500px 一个光晕
      const count = Math.ceil(height / interval);
      let html = '';

      for (let i = 0; i < count; i++) {
        const top = i * interval;
        const opacity = (i % 2 === 0) ? 0.07 : 0.05;
        const opacityMid = (i % 2 === 0) ? 0.03 : 0.02;
        html += `<div class="glow" style="top: ${top}px; background: radial-gradient(ellipse 80% 50% at 50% 50%, rgba(229,57,53,${opacity}) 0%, rgba(229,57,53,${opacityMid}) 40%, rgba(255,255,255,0) 70%);"></div>`;
      }

      container.innerHTML = html;
    }

    // 渲染预览
    function renderPreview() {
      const text = inputText.value.trim();
      const styles = getStyles();

      if (!text) {
        previewWrapper.innerHTML = '<div class="empty-state">请在左侧输入内容</div>';
        pageCount.textContent = '0';
        exportBtn.disabled = true;
        return;
      }

      const pages = text.split(/\n---\n|\n---$|^---\n/).filter(p => p.trim());
      pageCount.textContent = pages.length;
      exportBtn.disabled = false;

      previewWrapper.innerHTML = pages.map((pageText, index) => {
        const blocks = parseBlocks(pageText.trim());
        const content = renderPreviewContent(blocks, styles);
        const cardHtml = generatePageCard(content, index, pages.length, styles);
        return `
          <div class="preview-item">
            ${cardHtml}
            <span class="page-indicator">第 ${index + 1} 页 / 共 ${pages.length} 页</span>
          </div>
        `;
      }).join('');

      // 动态生成水印和光晕
      requestAnimationFrame(() => {
        document.querySelectorAll('.page-card').forEach(card => {
          const height = card.offsetHeight / 0.42; // 还原实际高度（因为 zoom: 0.42）
          const wmContainer = card.querySelector('.watermark-container');
          if (wmContainer) generateWatermarks(wmContainer, height);
          const glowContainer = card.querySelector('.glow-container');
          if (glowContainer) generateGlows(glowContainer, height);
        });
      });
    }

    // 导出图片
    async function exportImages() {
      const text = inputText.value.trim();
      const styles = getStyles();
      const pages = text.split(/\n---\n|\n---$|^---\n/).filter(p => p.trim());

      if (pages.length === 0) return;

      exportingModal.classList.remove('hidden');
      exportBtn.disabled = true;

      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }

        const zip = new JSZip();

        for (let i = 0; i < pages.length; i++) {
          const blocks = parseBlocks(pages[i].trim());
          const content = renderExportContent(blocks, styles);
          const cardHtml = generatePageCard(content, i, pages.length, styles);

          // 创建临时元素
          exportContainer.innerHTML = cardHtml;
          const card = exportContainer.querySelector('.page-card');

          // 动态生成水印和光晕
          const height = card.offsetHeight;
          const wmContainer = card.querySelector('.watermark-container');
          if (wmContainer) generateWatermarks(wmContainer, height);
          const glowContainer = card.querySelector('.glow-container');
          if (glowContainer) generateGlows(glowContainer, height);

          const canvas = await html2canvas(card, {
            scale: 1.5,
            useCORS: true,
            logging: false,
            backgroundColor: '#ffffff'
          });
          const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
          zip.file(`page_${String(i + 1).padStart(2, '0')}.jpg`, blob);
        }

        exportContainer.innerHTML = '';

        const content = await zip.generateAsync({ type: 'blob' });
        const timestamp = new Date().toISOString().slice(0, 10);
        saveAs(content, `晚点风格_${timestamp}.zip`);
      } catch (error) {
        console.error('导出失败:', error);
        alert('导出失败，请重试');
      } finally {
        exportingModal.classList.add('hidden');
        exportBtn.disabled = false;
      }
    }

    // 校验字号范围（失焦时）
    function validateFontSize() {
      let size = parseInt(fontSize.value) || 36;
      if (size < 20) size = 20;
      if (size > 50) size = 50;
      fontSize.value = size;
      renderPreview();
    }

    function validateTitleSize() {
      let size = parseInt(titleSize.value) || 42;
      if (size < 24) size = 24;
      if (size > 80) size = 80;
      titleSize.value = size;
      renderPreview();
    }

    // 事件绑定
    inputText.addEventListener('input', renderPreview);
    exportBtn.addEventListener('click', exportImages);
    fontSize.addEventListener('input', renderPreview);
    fontSize.addEventListener('blur', validateFontSize);
    lineHeight.addEventListener('change', renderPreview);
    padding.addEventListener('change', renderPreview);
    titleFont.addEventListener('change', renderPreview);
    titleSize.addEventListener('input', renderPreview);
    titleSize.addEventListener('blur', validateTitleSize);

    // 初始化
    renderPreview();
  </script>
</body>
</html>
